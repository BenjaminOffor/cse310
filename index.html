<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Quiz</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
        }
        .quiz-container {
            max-width: 600px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px #ccc;
        }
        .question {
            margin-bottom: 15px;
            font-weight: bold;
        }
        .options button {
            display: block;
            margin: 5px 0;
            width: 100%;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        .correct {
            background-color: #c8e6c9;
        }
        .incorrect {
            background-color: #ffcdd2;
        }
        #nextBtn, #restartBtn {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        #result {
            margin-top: 20px;
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>JavaScript Quiz</h1>
    <div id="quiz"></div>
    <button id="nextBtn" style="display:none;">Next Question</button>
    <button id="restartBtn" style="display:none;">Restart Quiz</button>
    <div id="result"></div>
</div>

<script src="script.js"></script>
</body>
</html>
